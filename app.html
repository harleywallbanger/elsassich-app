<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Elsassich</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:#B8201A;font-family:'Outfit',sans-serif;overscroll-behavior:none}
    ::-webkit-scrollbar{display:none}
    #root{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
    #splash{position:fixed;inset:0;background:linear-gradient(160deg,#7A0D08,#B8201A,#D4302A);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s .5s}
    #splash.hide{opacity:0;pointer-events:none}
    .sp-emoji{font-size:72px;margin-bottom:20px;animation:bounce 1.2s ease-in-out infinite}
    .sp-title{font-family:'Cormorant Garamond',serif;font-size:36px;color:#fff;font-weight:700;margin-bottom:8px}
    .sp-sub{font-size:14px;color:rgba(255,255,255,.75);letter-spacing:1px}
    .sp-dots{display:flex;gap:8px;margin-top:28px}
    .sp-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4);animation:blink 1.2s ease-in-out infinite}
    .sp-dot:nth-child(2){animation-delay:.2s}.sp-dot:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
    .streak-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#F3EEE8;box-shadow:0 2px 8px rgba(170,140,128,.3)}
    .streak-item{display:flex;align-items:center;gap:5px;flex-shrink:0}
    .streak-fire{font-size:18px}
    .streak-num{font-size:18px;font-weight:800;color:#B8201A;font-family:'Cormorant Garamond',serif}
    .streak-label{font-size:10px;color:#9A8070;font-weight:600}
    .xp-bar-wrap{flex:1;height:6px;background:#E6E0DA;border-radius:6px;overflow:hidden;box-shadow:inset 2px 2px 4px rgba(170,140,128,.4)}
    .xp-bar-fill{height:100%;background:linear-gradient(90deg,#7A0D08,#B8201A,#D4302A);border-radius:6px;transition:width .5s ease}
    .level-badge{display:flex;align-items:center;gap:5px;background:#F8F3ED;border-radius:20px;padding:5px 11px;cursor:pointer;box-shadow:2px 2px 6px rgba(170,140,128,.4),-2px -2px 6px rgba(255,248,243,.9);flex-shrink:0}
    .level-icon{font-size:16px}
    .level-label{font-size:11px;font-weight:700;color:#B8201A;white-space:nowrap}
    .levelup-toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7A0D08,#D4302A);border-radius:20px;padding:14px 22px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(184,32,26,.5);z-index:500;animation:toastIn .4s cubic-bezier(.34,1.56,.64,1)}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.8)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
    .levelup-ico{font-size:32px}
    .levelup-label{font-size:10px;color:rgba(255,255,255,.75);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
    .levelup-name{font-family:'Cormorant Garamond',serif;font-size:20px;color:#fff;font-weight:700}
    .profile-sheet{width:100%;max-width:430px;background:#F8F3ED;border-radius:24px 24px 0 0;padding:24px 20px 50px;box-shadow:0 -8px 30px rgba(170,140,128,.5);animation:slideUp .3s ease;max-height:85vh;overflow-y:auto}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
    .profile-hero{text-align:center;margin-bottom:20px;padding:20px;background:linear-gradient(145deg,#7A0D08,#B8201A,#D4302A);border-radius:18px;color:#fff}
    .profile-lvl-ico{font-size:52px;margin-bottom:8px}
    .profile-lvl-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700}
    .profile-lvl-desc{font-size:13px;opacity:.8;margin-top:4px}
    .profile-stats{display:flex;gap:10px;margin-bottom:18px}
    .pstat{flex:1;background:#F3EEE8;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:3px 3px 8px rgba(170,140,128,.4),-3px -3px 8px rgba(255,248,243,.9)}
    .pstat-val{font-family:'Cormorant Garamond',serif;font-size:28px;color:#B8201A;font-weight:700}
    .pstat-label{font-size:10px;color:#9A8070;font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
    .profile-xp-section{margin-bottom:18px}
    .profile-xp-label{display:flex;justify-content:space-between;font-size:12px;color:#5C3D32;font-weight:600;margin-bottom:7px}
    .profile-xp-bar{height:8px;background:#E6E0DA;border-radius:8px;overflow:hidden;box-shadow:inset 2px 2px 4px rgba(170,140,128,.4)}
    .profile-xp-fill{height:100%;background:linear-gradient(90deg,#7A0D08,#D4302A);border-radius:8px;transition:width .5s ease}
    .profile-next{font-size:11px;color:#9A8070;margin-top:6px;text-align:center}
    .levels-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
    .lv-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:13px;background:#F3EEE8;box-shadow:2px 2px 6px rgba(170,140,128,.3),-2px -2px 6px rgba(255,248,243,.8);opacity:.45}
    .lv-row.unlocked{opacity:1}
    .lv-row.current{background:linear-gradient(135deg,#FFF5F5,#FEE8E8);border:1.5px solid #F5C0BB}
    .lv-ico{font-size:24px;flex-shrink:0}
    .lv-info{flex:1}
    .lv-name{font-size:13px;font-weight:700;color:#1C0A06}
    .lv-desc{font-size:11px;color:#9A8070;margin-top:1px}
    .lv-pts{font-size:11px;color:#B8201A;font-weight:700;flex-shrink:0}
    .onb-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;justify-content:center}
    .onb-bg{position:absolute;inset:0}
    .onb-card{position:relative;width:100%;max-width:430px;background:#F8F3ED;border-radius:28px 28px 0 0;padding:28px 22px 48px;box-shadow:0 -12px 40px rgba(0,0,0,.3);max-height:92vh;overflow-y:auto;animation:slideUp .4s cubic-bezier(.34,1.2,.64,1)}
    .onb-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#1C0A06;margin-bottom:4px}
    .onb-sub{font-size:13px;color:#9A8070;margin-bottom:16px}
    .onb-btn{width:100%;background:linear-gradient(145deg,#7A0D08,#B8201A,#D4302A);color:#fff;border:none;border-radius:16px;padding:16px;font-family:'Outfit',sans-serif;font-weight:800;font-size:16px;cursor:pointer;box-shadow:4px 4px 12px rgba(184,32,26,.4);letter-spacing:.3px}
    .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#F8F3ED;border-top:1px solid #D5CCC4;display:flex;align-items:center;padding:8px 14px;padding-bottom:max(8px,env(safe-area-inset-bottom));box-shadow:0 -4px 16px rgba(170,140,128,.25);z-index:100;gap:10px}
    .bb-ad{display:flex;align-items:center;gap:9px;flex:1;min-width:0;text-decoration:none;cursor:pointer}
    .bb-ad-logo{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .bb-ad-text{flex:1;min-width:0}
    .bb-ad-label{font-size:8px;color:#9A8070;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
    .bb-ad-name{font-size:12px;font-weight:700;color:#1C0A06;font-family:'Cormorant Garamond',serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bb-ad-desc{font-size:10px;color:#9A8070;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bb-sep{width:1px;height:36px;background:#D5CCC4;flex-shrink:0}
    .bb-mic{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;cursor:pointer;padding:4px 8px;border-radius:12px;flex-shrink:0;position:relative}
    .bb-mic-ring{position:absolute;inset:-3px;border-radius:14px;border:2px solid transparent;transition:all .3s}
    .bb-mic.on .bb-mic-ring{border-color:#B8201A;animation:ringPulse 1s ease-in-out infinite}
    @keyframes ringPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.6}}
    .bb-mic-ico{font-size:22px}
    .bb-mic-label{font-size:9px;color:#9A8070;font-weight:600}
    .bb-mic.on .bb-mic-label{color:#B8201A}
  </style>
</head>

    window._appCode = "import { useState, useRef, useCallback, useEffect } from \"react\";\n\n// \u2500\u2500 Stockage persistant compatible iOS natif + web \u2500\u2500\nconst Storage = {\n  _data: {},\n  getItem(key) {\n    try {\n      if (typeof localStorage !== 'undefined') return Storage.getItem(key);\n    } catch {}\n    return this._data[key] ?? null;\n  },\n  setItem(key, value) {\n    try {\n      if (typeof localStorage !== 'undefined') { Storage.setItem(key, value); return; }\n    } catch {}\n    this._data[key] = value;\n  },\n};\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n// TH\u00c8MES VISUELS\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nconst THEMES = {\n  alsace: {\n    name:\"Alsace\", icon:\"\ud83e\udd68\",\n    bg:\"#F5EFE0\", surface:\"#FFFFFF\", card:\"#FAF6EF\",\n    border:\"#E8DCC8\", text:\"#1A1208\", sub:\"#6B5C40\", muted:\"#A89070\",\n    accent:\"#C0392B\", accentDark:\"#8B1A1A\", accentLight:\"#FEE8E8\",\n    grad:\"linear-gradient(150deg,#8B1A1A 0%,#C0392B 55%,#E05A30 100%)\",\n    tabBg:\"#FFFFFF\", shadow:\"rgba(0,0,0,0.10)\",\n  },\n  nuit: {\n    name:\"Nuit\", icon:\"\ud83c\udf19\",\n    bg:\"#0A0812\", surface:\"#130F1E\", card:\"#1C1830\",\n    border:\"#2E2850\", text:\"#E8E0FF\", sub:\"#9B8EC4\", muted:\"#5A4E80\",\n    accent:\"#7C6FCD\", accentDark:\"#5A4EAA\", accentLight:\"#1E1840\",\n    grad:\"linear-gradient(150deg,#1A1040 0%,#4A3A9A 55%,#7C6FCD 100%)\",\n    tabBg:\"#130F1E\", shadow:\"rgba(0,0,0,0.5)\",\n  },\n  foret: {\n    name:\"For\u00eat\", icon:\"\ud83c\udf32\",\n les\">\n              {EXEMPLES.map((ex,i) => (\n                <button key={i} className=\"ex-chip\" onClick={() => { setInput(ex); translate(ex); }}>{ex}</button>\n              ))}\n            </div>\n            <div className=\"tbox\">\n              <div className=\"tlabel\">{direction===\"fr2als\" ? \"\ud83c\uddeb\ud83c\uddf7 Texte en fran\u00e7ais\" : \"\ud83e\udd68 Texte en alsacien\"}</div>\n              <textarea className=\"tarea\"\n                placeholder={direction===\"fr2als\" ? \"Ex : Je veux une bi\u00e8re, s'il vous pla\u00eet\u2026\" : \"Ex : Ich will e Bier, w\u00e0nn's beliebt\u2026\"}\n                value={input} onChange={e=>setInput(e.target.value)} rows={3}\n                onKeyDown={e => { if(e.key===\"Enter\" && !e.shiftKey){e.preventDefault();translate();}}} />\n              {listening && transcript && <div className=\"transcript-preview\">\ud83c\udf99\ufe0f {transcript}\u2026</div>}\n              <div className=\"tactions\">\n                <button className={`btn-sq ${listening?\"on\":\"\"}`} onClick={toggleVoice} title=\"Parler\">{listening?\"\u23f9\ufe0f\":\"\ud83c\udf99\ufe0f\"}</button>\n                <button className=\"btn-main\" onClick={()=>translate()} disabled={loading||!input.trim()}>\n                  {loading?\"\u2026\":\"\ud83e\udd68 Hop !\"}\n                </button>\n              </div>\n            </div>\n            {loading && <div className=\"loader\"><div className=\"dot\"/><div className=\"dot\"/><div className=\"dot\"/><span>L'Els\u00e4ssisch r\u00e9fl\u00e9chit\u2026</span></div>}\n            {result && (\n              <div className=\"res\" onTouchStart={handleSwipeStart} onTouchEnd={handleSwipeEnd} onMouseDown={handleSwipeStart} onMouseUp={handleSwipeEnd}>\n                <div style={{display:\"flex\",alignItems:\"center\",justifyContent:\"space-between\"}}>\n                  <div className=\"res-dir\">{result.direction}</div>\n                  <div className=\"res-swipe-hint\"><span className=\"swipe-arrow\">\u2190</span><span>glisser pour envoyer</span></div>\n                </div>\n                <div className=\"res-main\">{result.translation}</div>\n                {result.phonetic && <div className=\"res-phonetic\">\ud83d\udce2 /{result.phonetic}/</div>}\n                {result.literal && <div className=\"res-literal\">\ud83d\udca1 Litt\u00e9ralement : <em>{result.literal}</em></div>}\n                {(result.bas_rhin||result.haut_rhin) && (\n                  <div className=\"res-chips\">\n                    {result.bas_rhin && <span className=\"chip\">\u2b06\ufe0f {result.bas_rhin}</span>}\n                    {result.haut_rhin && <span className=\"chip\">\u2b07\ufe0f {result.haut_rhin}</span>}\n                  </div>\n                )}\n                {result.register && <span className=\"reg-tag\">\ud83c\udff7\ufe0f {result.register}</span>}\n                {result.notes && <div className=\"res-note\" style={{marginTop:10}}>\ud83e\udde0 {result.notes}</div>}\n                <div className=\"res-actions\" ref={shareRef}>\n                  <button className=\"res-btn\" onClick={() => speak(result.translation,\"res\")}>{speaking===\"res\"?\"\ud83d\udd0a Lecture\u2026\":\"\ud83d\udd0a \u00c9couter\"}</button>\n                  <button className=\"res-btn\" onClick={() => setShowShare(s=>!s)}>\ud83d\udce4 Envoyer</button>\n                  <button className=\"res-btn\" onClick={() => {setInput(\"\");setResult(null);}}>\ud83d\uddd1\ufe0f</button>\n                  {showShare && (\n                    <div className=\"share-panel\">\n                      <div className=\"share-row\">\n                        <button className=\"share-btn\" onClick={copyToClipboard}><span>{copyOk?\"\u2705\":\"\ud83d\udccb\"}</span><span>{copyOk?\"Copi\u00e9 !\":\"Copier\"}</span></button>\n                        <button className=\"share-btn\" onClick={shareWhatsApp}><span>\ud83d\udcac</span><span>WhatsApp</span></button>\n                        <button className=\"share-btn\" onClick={shareNative}><span>\ud83d\udcf1</span><span>iMessage</span></button>\n                      </div>\n                    </div>\n                  )}\n                </div>\n              </div>\n            )}\n            {history.length > 0 && <>\n              <hr className=\"divider\"/>\n              <div className=\"section-micro\">\ud83d\udd50 Historique</div>\n              {history.slice(0,5).map((h,i) => (\n                <div key={i} className=\"hist-item\" onClick={()=>{setInput(h.input);setResult(h.result);}}>\n                  <div className=\"hist-q\">\"{h.input}\"</div>\n                  <div className=\"hist-a\">\u2192 {h.result.translation}</div>\n                  <div className=\"hist-ts\">{h.ts}</div>\n                </div>\n              ))}\n            </>}\n          </>}\n\n          {/* \u2550\u2550 PRONONCER \u2550\u2550 */}\n          {tab===\"prononcer\" && <>\n            <div className=\"sec-title\">Prononcer \ud83d\udd0a</div>\n            <div className=\"sec-sub\">\u00c9coute et r\u00e9p\u00e8te \u2014 mot par mot, \u00e0 ton rythme</div>\n            <div className=\"pron-cats\">\n              {[...new Set(DICTIONARY.map(d=>d.cat))].map(c => (\n                <button key={c} className={`pron-cat ${pronCat===c?\"active\":\"\"}`} onClick={()=>{ stopPron(); setPronCat(c); setPronIdx(null); }}>\n                  {DICTIONARY.find(d=>d.cat===c)?.emoji} {c.charAt(0).toUpperCase()+c.slice(1)}\n                </button>\n              ))}\n            </div>\n            <div className=\"pron-controls\">\n              <div className=\"pron-ctrl-row\">\n                <span className=\"pron-ctrl-label\">\ud83d\udc22 Vitesse</span>\n                <input type=\"range\" className=\"pron-slider\" min=\"0.4\" max=\"1.2\" step=\"0.05\" value={pronRate} onChange={e=>{ const v=parseFloat(e.target.value); setPronRate(v); pronRateRef.current=v; }} />\n                <span className=\"pron-ctrl-val\">\u00d7{pronRate.toFixed(2)}</span>\n              </div>\n              <div className=\"pron-ctrl-row\">\n                <span className=\"pron-ctrl-label\">\ud83d\udd01 Boucle</span>\n                <label className=\"pron-toggle\">\n                  <input type=\"checkbox\" checked={pronLoop} onChange={e=>{ setPronLoop(e.target.checked); pronLoopRef.current=e.target.checked; }} />\n                  <span style={{fontSize:12,color:T.sub,fontWeight:500,marginLeft:4}}>{pronLoop ? \"R\u00e9p\u00e9tition activ\u00e9e\" : \"Une seule fois\"}</span>\n                </label>\n              </div>\n            </div>\n            <div className=\"pron-play-row\">\n              {!pronPlaying\n                ? <button className=\"pron-play-btn\" onClick={startPronAll}>\u25b6\ufe0f Lire tous les mots ({pronWords.length})</button>\n                : <>\n                    <button className=\"pron-play-btn\" onClick={stopPron} style={{background:\"linear-gradient(135deg,#3a3a3a,#1a1a1a)\"}}>\u23f9 Arr\u00eater</button>\n                    <div className=\"pron-stop-btn\"><div className=\"pron-wave\">{[1,2,3,4,5].map(j=><div key={j} className=\"pron-bar\" style={{background:T.accent}}/>)}</div></div>\n                  </>\n              }\n            </div>\n            <div className=\"pron-tip\">\ud83d\udca1 Tape un mot pour l'\u00e9couter seul \u00b7 \u00d70.60 = vitesse id\u00e9ale pour m\u00e9moriser les sons alsaciens</div>\n            <div className=\"pron-count\">{pronWords.length} mot{pronWords.length>1?\"s\":\"\"} \u2014 <em>{pronCat}</em></div>\n            <div className=\"pron-list\">\n              {pronWords.map((w, i) => (\n                <div key={i} className={`pron-word ${pronIdx===i?\"active\":\"\"}`} onClick={()=>{ stopPron(); setPronIdx(i); speakWord(w.als, pronRate, ()=>setPronIdx(null)); }}>\n                  <div className=\"pron-word-emoji\">{w.emoji}</div>\n                  <div style={{flex:1}}>\n                    <div className=\"pron-word-als\">{w.als}</div>\n                    <div className=\"pron-word-fr\">{w.fr}</div>\n                    <div className=\"pron-word-ph\">/{w.phonetic}/</div>\n                  </div>\n                  {pronIdx===i\n                    ? <div className=\"pron-wave\">{[1,2,3,4,5].map(j=><div key={j} className=\"pron-bar\"/>)}</div>\n                    : <button className=\"pron-word-btn\" onClick={e=>{ e.stopPropagation(); stopPron(); setPronIdx(i); speakWord(w.als, pronRate, ()=>setPronIdx(null)); }}>\ud83d\udd0a</button>\n                  }\n                </div>\n              ))}\n            </div>\n          </>}\n\n          {/* \u2550\u2550 EXPRESSIONS \u2550\u2550 */}\n          {tab===\"expressions\" && <>\n            <div className=\"sec-title\">Expressions idiomatiques</div>\n            <div className=\"sec-sub\">Les vraies perles du dialecte \u2014 tape pour d\u00e9voiler</div>\n            {EXPRESSIONS.map((e,i) => (\n              <div key={i} className=\"ecard\" onClick={()=>setFlipped(flipped===i?null:i)}>\n                <div className=\"ecard-head\">\n                  <div className=\"ecard-emoji\">{e.emoji}</div>\n                  <div style={{flex:1}}>\n                    <div className=\"ecard-als\">\u00ab {e.als} \u00bb</div>\n                    <div className=\"ecard-fr\">{e.fr}</div>\n                  </div>\n                  <div className=\"ecard-toggle\" style={{transform:flipped===i?\"rotate(180deg)\":\"none\"}}>\u25bc</div>\n                </div>\n                {flipped===i && (\n                  <div className=\"ecard-body\">\n                    <div className=\"elabel\">Sens litt\u00e9ral</div>\n                    <div className=\"evalue\">{e.literal}</div>\n                    <div className=\"elabel\">\u00c9quivalent fran\u00e7ais</div>\n                    <div className=\"equiv\">\ud83d\udcac {e.equiv}</div>\n                  </div>\n                )}\n              </div>\n            ))}\n          </>}\n\n          {/* \u2550\u2550 QUIZ \u2550\u2550 */}\n          {tab===\"quiz\" && <>\n            <div className=\"sec-title\">Quiz Els\u00e4ssisch \ud83c\udfaf</div>\n            <div className=\"sec-sub\">{shuffled.length} questions \u2014 teste ton niveau !</div>\n            {quizDone ? (\n              <div className=\"quiz-wrap\">\n                <div className=\"quiz-score\">\n                  <div style={{fontSize:52}}>\ud83c\udfc6</div>\n                  <div className=\"score-big\">{quizScore}/{shuffled.length}</div>\n                  <div className=\"score-msg\">\n                    {quizScore===shuffled.length?\"\ud83c\udf1f Parfait ! Tu parles comme un vrai Alsacien !\":\n                     quizScore>=shuffled.length*.75?\"\ud83d\udc4d Sehr g\u00fcet ! Encore un peu de pratique !\":\n                     quizScore>=shuffled.length*.5?\"\ud83d\udcd6 Continue d'apprendre, c'est bien parti !\":\"\ud83e\udd68 Hopla ! Recommence !\"}\n                  </div>\n                  <button className=\"btn-restart\" onClick={resetQuiz}>\ud83d\udd04 Recommencer</button>\n                </div>\n              </div>\n            ) : (\n              <div className=\"quiz-wrap\">\n                <div className=\"quiz-head\">\n                  <div className=\"qpb-wrap\"><div className=\"qpb\" style={{width:`${(quizIdx/shuffled.length)*100}%`}}/></div>\n                  <div className=\"qnum\">Question {quizIdx+1} / {shuffled.length}</div>\n                  <div className=\"qq\">{shuffled[quizIdx].q}</div>\n                </div>\n                <div className=\"qanswers\">\n                  {shuffled[quizIdx].a.map((a,i) => {\n                    let cls=\"qans\";\n                    if(quizPick!==null){ if(i===shuffled[quizIdx].c) cls+=\" correct\"; else if(i===quizPick) cls+=\" wrong\"; }\n                    return (\n                      <button key={i} className={cls} onClick={()=>pickAnswer(i)} disabled={quizPick!==null}>\n                        <div className=\"qans-ico\">{quizPick===null?\"ABCD\"[i]:i===shuffled[quizIdx].c?\"\u2713\":i===quizPick?\"\u2717\":\"ABCD\"[i]}</div>\n                        {a}\n                      </button>\n                    );\n                  })}\n                  <div style={{textAlign:\"center\",marginTop:8,fontSize:12,color:T.muted,fontWeight:600}}>Score : {quizScore}/{quizTotal} \u2728</div>\n                </div>\n              </div>\n            )}\n          </>}\n\n          {/* \u2550\u2550 LE\u00c7ON \u2550\u2550 */}\n          {tab===\"lesson\" && <>\n            {!lessonCat ? <>\n              <div className=\"sec-title\">Le\u00e7ons \ud83d\udcda</div>\n              <div className=\"sec-sub\">Apprends par th\u00e8me \u2014 flashcards + exercices</div>\n              <div className=\"lesson-grid\">\n                {LESSON_CATS.map(lc => (\n                  <div key={lc.id} className=\"lcat\" onClick={()=>startLesson(lc.id)}>\n                    <div className=\"lcat-emoji\">{lc.emoji}</div>\n                    <div className=\"lcat-label\">{lc.label}</div>\n                    <div className=\"lcat-desc\">{lc.desc}</div>\n                  </div>\n                ))}\n              </div>\n            </> : <>\n              {lessonStep === 1 && <>\n                <div className=\"lesson-header\">\n                  <button className=\"back-btn\" onClick={resetLesson}>\u2190 Retour</button>\n                  <div className=\"lesson-title\">{LESSON_CATS.find(l=>l.id===lessonCat)?.emoji} {LESSON_CATS.find(l=>l.id===lessonCat)?.label}</div>\n                </div>\n                <div className=\"step-bar\">\n                  <div className=\"step active\"/><div className=\"step\"/><div className=\"step\"/>\n                </div>\n                <div style={{fontSize:12,color:T.muted,textAlign:\"center\",marginBottom:13}}>\ud83d\udcd6 \u00c9tape 1/3 \u2014 Flashcards \u00b7 Mot {lessonCardIdx+1}/{lessonWords.length}</div>\n                <div className=\"flashcard\" onClick={()=>setLessonCardFlipped(f=>!f)}>\n                  {!lessonCardFlipped ? <>\n                    <div className=\"fc-front-label\">En alsacien</div>\n                    <div className=\"fc-als\">{lessonWords[lessonCardIdx]?.emoji} {lessonWords[lessonCardIdx]?.als}</div>\n                    <div className=\"fc-phonetic\">/{lessonWords[lessonCardIdx]?.phonetic}/</div>\n                    <div className=\"fc-tap\">\ud83d\udc46 Tape pour voir la traduction</div>\n                  </> : <>\n                    <div className=\"fc-front-label\">En fran\u00e7ais</div>\n                    <div className=\"fc-fr\">{lessonWords[lessonCardIdx]?.fr}</div>\n                    <div className=\"fc-phonetic\" style={{marginTop:8}}>\n                      \u2b06\ufe0f {lessonWords[lessonCardIdx]?.bas} \u00b7 \u2b07\ufe0f {lessonWords[lessonCardIdx]?.haut !== lessonWords[lessonCardIdx]?.bas ? lessonWords[lessonCardIdx]?.haut : \"idem\"}\n                    </div>\n                  </>}\n                </div>\n                {lessonCardFlipped && (\n                  <div className=\"known-row\">\n                    <button className=\"known-btn no\" onClick={()=>{ setLessonCardFlipped(false); if(lessonCardIdx+1<lessonWords.length) setLessonCardIdx(i=>i+1); else setLessonStep(2); }}>\ud83d\ude05 \u00c0 revoir</button>\n                    <button className=\"known-btn yes\" onClick={()=>{ setLessonKnown(k=>[...k,lessonCardIdx]); setLessonCardFlipped(false); if(lessonCardIdx+1<lessonWords.length) setLessonCardIdx(i=>i+1); else setLessonStep(2); }}>\u2705 Je connais !</button>\n                  </div>\n                )}\n                <div className=\"fc-nav\">\n                  <button className=\"fc-nav-btn\" disabled={lessonCardIdx===0} onClick={()=>{ setLessonCardIdx(i=>i-1); setLessonCardFlipped(false); }}>\u2190 Pr\u00e9c.</button>\n                  <div className=\"fc-counter\">{lessonCardIdx+1} / {lessonWords.length}</div>\n                  <button className=\"fc-nav-btn primary\" onClick={()=>{ if(lessonCardIdx+1<lessonWords.length){ setLessonCardIdx(i=>i+1); setLessonCardFlipped(false); } else setLessonStep(2); }}>\n                    {lessonCardIdx+1<lessonWords.length ? \"Suiv. \u2192\" : \"Exercice \u2192\"}\n                  </button>\n                </div>\n              </>}\n              {lessonStep === 2 && lessonWords.length > 0 && <>\n                <div className=\"lesson-header\">\n                  <button className=\"back-btn\" onClick={()=>setLessonStep(1)}>\u2190 Flashcards</button>\n                  <div className=\"lesson-title\">Exercice</div>\n                </div>\n                <div className=\"step-bar\"><div className=\"step done\"/><div className=\"step done\"/><div className=\"step active\"/></div>\n                <div style={{fontSize:12,color:T.muted,textAlign:\"center\",marginBottom:12}}>\ud83c\udfaf \u00c9tape 2/3 \u00b7 Question {lessonExIdx+1}/{lessonWords.length}</div>\n                <div className=\"ex-card\">\n                  <div className=\"ex-question\">Que signifie ce mot ?</div>\n                  <div className=\"ex-als\">{lessonWords[lessonExIdx]?.emoji} {lessonWords[lessonExIdx]?.als}</div>\n                  <div className=\"ex-phonetic\">/{lessonWords[lessonExIdx]?.phonetic}/</div>\n                </div>\n                <div className=\"ex-answers\">\n                  {exOptions.map((opt,i) => {\n                    const isCorrect = opt === lessonWords[lessonExIdx]?.fr;\n                    const isPicked = opt === lessonExPick;\n                    let cls = \"ex-ans\";\n                    if (lessonExPick !== null){ if (isCorrect) cls += \" correct\"; else if (isPicked) cls += \" wrong\"; }\n                    return <button key={i} className={cls} onClick={()=>pickLessonAnswer(opt)} disabled={lessonExPick!==null}>{lessonExPick!==null && isCorrect?\"\u2713 \":lessonExPick!==null && isPicked?\"\u2717 \":\"\"}{opt}</button>;\n                  })}\n                </div>\n                <div style={{textAlign:\"center\",fontSize:12,color:T.muted,marginTop:11,fontWeight:600}}>Score : {lessonScore}/{lessonExIdx} \u2b50</div>\n              </>}\n              {lessonStep === 3 && <>\n                <div className=\"lesson-result\">\n                  <div className=\"lr-emoji\">{lessonScore >= lessonWords.length*0.8 ? \"\ud83c\udfc6\" : lessonScore >= lessonWords.length*0.5 ? \"\ud83d\udc4d\" : \"\ud83d\udcd6\"}</div>\n                  <div className=\"lr-score\">{lessonScore}/{lessonWords.length}</div>\n                  <div className=\"lr-msg\">{lessonScore===lessonWords.length ? \"Parfait ! Tu ma\u00eetrises ce th\u00e8me !\" : lessonScore >= lessonWords.length*0.8 ? \"Tr\u00e8s bien ! Encore un peu !\" : lessonScore >= lessonWords.length*0.5 ? \"Pas mal ! Continue !\" : \"Hopla ! Recommence les flashcards !\"}</div>\n                  <div className=\"lr-sub\">{lessonKnown.length} mots m\u00e9moris\u00e9s</div>\n                  <div className=\"lr-btns\">\n                    <button className=\"lr-btn\" onClick={()=>startLesson(lessonCat)}>\ud83d\udd04 Recommencer</button>\n                    <button className=\"lr-btn primary\" onClick={resetLesson}>\ud83d\udcda Autre le\u00e7on</button>\n                  </div>\n                </div>\n              </>}\n            </>}\n          </>}\n\n          {/* \u2550\u2550 COMMENT DITES-VOUS \u2550\u2550 */}\n          {tab===\"cdv\" && <>\n            <div className=\"sec-title\">Comment dites-vous ? \ud83d\udde3\ufe0f</div>\n            <div className=\"sec-sub\">Les vraies phrases du quotidien \u2014 alsacien authentique</div>\n            <div className=\"cdv-themes\">\n              {COMMENT_DITES_VOUS.map((th, i) => (\n                <button key={i} className={`cdv-theme ${cdvTheme===i?\"active\":\"\"}`} onClick={()=>{ setCdvTheme(i); setCdvExpanded(null); }}>\n                  {th.theme}\n                </button>\n              ))}\n            </div>\n            {COMMENT_DITES_VOUS[cdvTheme].items.map((item, i) => (\n              <div key={i} className=\"cdv-card\" onClick={()=>setCdvExpanded(cdvExpanded===i?null:i)}>\n                <div className=\"cdv-card-head\">\n                  <div style={{flex:1}}>\n                    <div className=\"cdv-fr\">{item.fr}</div>\n                    <div className=\"cdv-als\">{item.als}</div>\n                    <div className=\"cdv-phonetic\">\ud83d\udce2 /{item.phonetic}/</div>\n                  </div>\n                  <button className=\"cdv-play\" onClick={e=>{ e.stopPropagation(); speak(item.als, `cdv${i}`); }}>\n                    {speaking===`cdv${i}`?\"\ud83d\udd0a\":\"\u25b6\ufe0f\"}\n                  </button>\n                  <div className=\"cdv-toggle\" style={{transform:cdvExpanded===i?\"rotate(180deg)\":\"none\"}}>\u25bc</div>\n                </div>\n                {cdvExpanded===i && (\n                  <div className=\"cdv-note\">\ud83d\udca1 {item.note}</div>\n                )}\n              </div>\n            ))}\n          </>}\n\n          {/* \u2550\u2550 ADS \u2550\u2550 */}\n          {tab===\"ads\" && <>\n            <div className=\"sec-title\">Partenaires locaux</div>\n            <div className=\"sec-sub\">Soutiens les commerces qui font vivre l'Alsace</div>\n            {LOCAL_ADS.map((ad,i) => (\n              <div key={i} className=\"adcard\" style={{background:`linear-gradient(135deg,${ad.colors[0]},${ad.colors[1]})`}}>\n                <div className=\"adlogo\">{ad.tag.split(\" \")[0]}</div>\n                <div className=\"adinfo\">\n                  <div className=\"adname\">{ad.name}</div>\n                  <div className=\"adcity\">\ud83d\udccd {ad.city}</div>\n                  <div className=\"addesc\">{ad.desc}</div>\n                  <div className=\"adtag\">{ad.tag}</div>\n                </div>\n                <button className=\"adcta\">Voir \u2192</button>\n              </div>\n            ))}\n            <div className=\"info-box\">\n              <h3>\ud83d\udcbc Vous avez un commerce alsacien ?</h3>\n              <p>Rejoignez notre r\u00e9seau de partenaires et touchez des milliers d'utilisateurs passionn\u00e9s de culture alsacienne. Carte rotative \u00e0 29\u20ac/mois.</p>\n              <button className=\"full-btn\">\ud83d\udce9 Nous contacter</button>\n            </div>\n            <div style={{textAlign:\"center\",fontSize:11,color:T.muted,marginTop:13}}>Partenaires locaux s\u00e9lectionn\u00e9s \u00b7 Sans r\u00e9gie publicitaire externe</div>\n          </>}\n\n        </div>\n\n        {/* \u2500\u2500 LEVEL UP TOAST \u2500\u2500 */}\n        {showLevelUp && (\n          <div className=\"levelup-toast\">\n            <div className=\"levelup-ico\">{showLevelUp.icon}</div>\n            <div className=\"levelup-text\">\n              <div className=\"levelup-label\">Nouveau grade !</div>\n              <div className=\"levelup-name\">{showLevelUp.label}</div>\n            </div>\n          </div>\n        )}\n\n        {/* \u2500\u2500 PROFIL MODAL \u2500\u2500 */}\n        {showProfile && (\n          <div className=\"correct-modal\" onClick={e=>{if(e.target===e.currentTarget)setShowProfile(false);}}>\n            <div className=\"profile-sheet\">\n              <div className=\"correct-handle\"/>\n              <div className=\"profile-hero\">\n                <div className=\"profile-lvl-ico\">{getLevel(xp).icon}</div>\n                <div className=\"profile-lvl-name\">{getLevel(xp).label}</div>\n                <div className=\"profile-lvl-desc\">{getLevel(xp).desc}</div>\n              </div>\n              <div className=\"profile-stats\">\n                <div className=\"pstat\">\n                  <div className=\"pstat-val\">{xp}</div>\n                  <div className=\"pstat-label\">Points</div>\n                </div>\n                <div className=\"pstat\">\n                  <div className=\"pstat-val\">{streak}</div>\n                  <div className=\"pstat-label\">Assiduit\u00e9 \ud83d\udd25</div>\n                </div>\n                <div className=\"pstat\">\n                  <div className=\"pstat-val\">{LEVELS.findIndex(l=>l.label===getLevel(xp).label)+1}/{LEVELS.length}</div>\n                  <div className=\"pstat-label\">Grade</div>\n                </div>\n              </div>\n              {getNextLevel(xp) && (\n                <div className=\"profile-xp-section\">\n                  <div className=\"profile-xp-label\">\n                    <span>Vers le grade {getNextLevel(xp).label} {getNextLevel(xp).icon}</span>\n                    <span>{xp} / {getNextLevel(xp).min} pts</span>\n                  </div>\n                  <div className=\"profile-xp-bar\">\n                    <div className=\"profile-xp-fill\" style={{width:Math.round(((xp-getLevel(xp).min)/(getNextLevel(xp).min-getLevel(xp).min))*100)+\"%\"}}/>\n                  </div>\n                  <div className=\"profile-next\">encore {getNextLevel(xp).min-xp} points pour le prochain grade</div>\n                </div>\n              )}\n              <div className=\"sec-title\" style={{fontSize:15,marginBottom:10}}>Tous les grades</div>\n              <div className=\"levels-list\">\n                {LEVELS.map((lv,i) => {\n                  const cur = getLevel(xp);\n                  const unlocked = xp >= lv.min;\n                  const isCur = lv.label === cur.label;\n                  return (\n                    <div key={i} className={\"lv-row\"+(unlocked?\" unlocked\":\"\")+(isCur?\" current\":\"\")}>\n                      <div className=\"lv-ico\">{lv.icon}</div>\n                      <div className=\"lv-info\">\n                        <div className=\"lv-name\">{lv.label}</div>\n                        <div className=\"lv-desc\">{lv.desc}</div>\n                      </div>\n                      <div className=\"lv-pts\">{lv.min} pts</div>\n                    </div>\n                  );\n                })}\n              </div>\n            </div>\n          </div>\n        )}\n\n        {/* \u2500\u2500 BOUTON CORRECTION FLOTTANT \u2500\u2500 */}\n        <button className=\"correct-fab\" onClick={()=>{ setShowCorrect(true); setCorrectSent(false); setCorrectWord(\"\"); setCorrectSugg(\"\"); }} title=\"Proposer une correction\">\n          \u270f\ufe0f\n        </button>\n\n        {/* \u2500\u2500 MODALE CORRECTION \u2500\u2500 */}\n        {showCorrect && (\n          <div className=\"correct-modal\" onClick={e=>{ if(e.target===e.currentTarget) setShowCorrect(false); }}>\n            <div className=\"correct-sheet\">\n              <div className=\"correct-handle\"/>\n              {!correctSent ? <>\n                <div className=\"correct-title\">\u270f\ufe0f Proposer une correction</div>\n                <div className=\"correct-sub\">L'alsacien est vivant et varie selon les villages \u2014 vos corrections enrichissent l'app pour tous !</div>\n                <div className=\"correct-label\">Mot ou phrase \u00e0 corriger</div>\n                <input className=\"correct-input\" placeholder=\"Ex : Wie hesch du \u2192 devrait \u00eatre\u2026\" value={correctWord} onChange={e=>setCorrectWord(e.target.value)} />\n                <div className=\"correct-label\">Votre correction / suggestion</div>\n                <input className=\"correct-input\" placeholder=\"Ex : Wie haischt d\u00fc ? (Bas-Rhin) \u00b7 source : OLCA\" value={correctSugg} onChange={e=>setCorrectSugg(e.target.value)} />\n                <div className=\"correct-btns\">\n                  <button className=\"correct-cancel\" onClick={()=>setShowCorrect(false)}>Annuler</button>\n                  <button className=\"correct-send\"\n                    disabled={!correctWord.trim()||!correctSugg.trim()}\n                    onClick={()=>{\n                      const mailto = `mailto:jerome75veit@gmail.com?subject=Correction%20Elsassich&body=${encodeURIComponent(\"Mot/phrase : \"+correctWord+\"\\n\\nCorrection propos\u00e9e : \"+correctSugg+\"\\n\\nVielmols merci !\")}`;\n                      window.open(mailto);\n                      setCorrectSent(true);\n                    }}>\n                    \ud83d\udce4 Envoyer la correction\n                  </button>\n                </div>\n                <div style={{fontSize:11,color:T.muted,marginTop:12,textAlign:\"center\",lineHeight:1.5}}>\n                  Vos corrections sont relues par J\u00e9r\u00f4me et int\u00e9gr\u00e9es \u00e0 chaque mise \u00e0 jour \ud83e\udd68\n                </div>\n              </> : <>\n                <div className=\"correct-success\">\n                  <div className=\"correct-success-ico\">\ud83c\udf89</div>\n                  <div className=\"correct-success-msg\">Vielmols merci !</div>\n                  <div className=\"correct-success-sub\">Votre correction a \u00e9t\u00e9 transmise.<br/>Elle sera int\u00e9gr\u00e9e \u00e0 la prochaine version.</div>\n                  <button className=\"correct-send\" style={{marginTop:18,width:\"100%\"}} onClick={()=>setShowCorrect(false)}>\n                    Fermer\n                  </button>\n                </div>\n              </>}\n            </div>\n          </div>\n        )}\n\n        {/* \u2500\u2500 BANDEAU PUB BAS PERMANENT \u2500\u2500 */}\n        {(()=>{\n          const adIdx = Math.floor(Date.now()/30000) % LOCAL_ADS.length;\n          const ad = LOCAL_ADS[adIdx];\n          return (\n            <div className=\"bottom-bar\">\n              <a className=\"bb-ad\" href=\"#\" onClick={e=>{e.preventDefault();setTab(\"ads\");}}>\n                <div className=\"bb-ad-logo\" style={{background:`linear-gradient(135deg,${ad.colors[0]},${ad.colors[1]})`}}>\n                  {ad.tag.split(\" \")[0]}\n                </div>\n                <div className=\"bb-ad-text\">\n                  <div className=\"bb-ad-label\">Partenaire local</div>\n                  <div className=\"bb-ad-name\">{ad.name}</div>\n                  <div className=\"bb-ad-desc\">{ad.city} \u00b7 {ad.desc.slice(0,38)}\u2026</div>\n                </div>\n              </a>\n              <div className=\"bb-sep\"/>\n              <button\n                className={\"bb-mic\"+(listening?\" on\":\"\")}\n                onClick={()=>{\n                  if(tab!==\"translate\") setTab(\"translate\");\n                  setTimeout(toggleVoice, tab!==\"translate\"?300:0);\n                }}\n                title={listening?\"Arr\u00eater la dict\u00e9e\":\"Dicter une phrase\"}>\n                <div className=\"bb-mic-ring\"/>\n                <div className=\"bb-mic-ico\">{listening?\"\u23f9\ufe0f\":\"\ud83c\udf99\ufe0f\"}</div>\n                <div className=\"bb-mic-label\">{listening?\"Stop\":\"Dicter\"}</div>\n              </button>\n            </div>\n          );\n        })()}\n\n      </div>\n    </>\n  );\n}\n";
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" onload="initApp()"></script>
  <script>
    function initApp() {
      try {
        const transformed = Babel.transform(window._appCode, {
          presets: ['react'],
          filename: 'app.jsx'
        }).code;
        const execCode = transformed + '\nconst _root = ReactDOM.createRoot(document.getElementById("root")); _root.render(React.createElement(AlsacienApp));';
        const fn = new Function(execCode);
        fn();
        // Hide splash
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 700); }
        }, 300);
      } catch(e) {
        const s = document.getElementById('splash');
        if (s) s.remove();
        document.getElementById('root').innerHTML = '<div style="padding:20px;color:red;font-family:monospace;font-size:11px;white-space:pre-wrap"><b>Erreur JS:</b>\n' + e.message + '\n\n' + (e.stack||'') + '</div>';
      }
    }
  </script>
</body>
</html>
